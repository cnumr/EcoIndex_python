version: "3"

includes:
  uv:
    taskfile: ../../tasks/UvTaskfile.yml
    dir: ../..
  docker:
    taskfile: ../../tasks/DockerTaskfile.yml
    dir: ../..

vars:
  PROJECT_NAME: api
  PACKAGE_NAME: ecoindex_api
  OUT_DIR: projects/ecoindex_api/dist
  RQ_DASHBOARD_PORT: "9181"
  RQ_WORKERS:
    sh: printf '%s' "${RQ_WORKERS:-3}"

tasks:
  update-openapi:
    desc: Update the openapi.json file
    cmds:
      - echo "Update the openapi.json file"
      - uv run --package ecoindex_api update-openapi > openapi.json
      - echo "Done!"
    dir: ../..
    silent: true

  bump:
    desc: Bump the API version with rules:major, minor, patch, premajor, preminor, prepatch or prerelease.
    cmds:
      - task: uv:bump
        vars:
          VERSION_FILE_PATH: "bases/ecoindex/backend/VERSION"
          VERSION_RULE: "{{.CLI_ARGS}}"
    dir: ../..
    silent: true

  docker-build-backend:
    desc: Build the backend docker image
    vars:
      VERSION:
        sh: cd ../.. && uv version --package ecoindex_api --short
    cmds:
      - echo "Build the backend docker image with version {{.VERSION}}"
      - task: docker:build
        vars:
          VERSION: "{{.VERSION}}"
          NAME: "api-backend"
          OPTIONS: -f projects/ecoindex_api/docker/backend/dockerfile --build-arg="wheel=ecoindex_api-{{.VERSION}}-py3-none-any.whl"
    silent: true

  docker-build-worker:
    desc: Build the worker docker image
    vars:
      VERSION:
        sh: cd ../.. && uv version --package ecoindex_api --short
    cmds:
      - echo "Build the worker docker image with version {{.VERSION}}"
      - task: docker:build
        vars:
          VERSION: "{{.VERSION}}"
          NAME: "api-worker"
          OPTIONS: -f projects/ecoindex_api/docker/worker/dockerfile --build-arg="wheel=ecoindex_api-{{.VERSION}}-py3-none-any.whl"
    silent: true

  docker-build-all:
    desc: Build uv project and then build the docker images
    cmds:
      - task: uv:build
      - task: docker-build-images
    dir: ../..
    silent: true

  docker-build-images:
    internal: true
    desc: Build the docker images
    deps: [docker-build-backend, docker-build-worker]
    cmds:
      - echo "Build the docker images"
    silent: true

  docker-push-backend:
    desc: Push the backend docker image
    vars:
      VERSION:
        sh: cd ../.. && uv version --package ecoindex_api --short
    cmds:
      - echo "Push the backend docker image with version {{.VERSION}}"
      - task: docker:push
        vars:
          VERSION: "{{.VERSION}}"
          NAME: "api-backend"
    silent: true

  docker-push-worker:
    desc: Push the worker docker image
    vars:
      VERSION:
        sh: cd ../.. && uv version --package ecoindex_api --short
    cmds:
      - echo "Push the worker docker image with version {{.VERSION}}"
      - task: docker:push
        vars:
          VERSION: "{{.VERSION}}"
          NAME: "api-worker"
    silent: true

  docker-push-all:
    desc: Push the docker images
    deps: [docker-push-backend, docker-push-worker]
    cmds:
      - echo "Push the docker images"
    silent: true

  docker-pull:
    desc: Pull the docker images
    cmds:
      - echo "Pull the docker images"
      - docker compose pull
    silent: true

  docker-up:
    desc: Start the docker-compose API
    deps: [init-env, init-docker-compose]
    cmds:
      - docker compose up {{.CLI_ARGS}}
    silent: true

  docker-down:
    desc: Stop the docker-compose API
    preconditions:
      - test -f docker-compose.yml
    cmds:
      - docker compose down {{.CLI_ARGS}}
    silent: true

  docker-exec:
    desc: Execute a command in the docker-compose API
    preconditions:
      - test -f docker-compose.yml
      - test -f .env
    cmds:
      - docker compose exec {{.CLI_ARGS}}
    silent: true

  docker-logs:
    desc: Show the logs of the docker-compose API
    preconditions:
      - test -f docker-compose.yml
    cmds:
      - docker compose logs {{.CLI_ARGS}}
    silent: true

  migration-create:
    desc: Create a new alembic migration
    cmds:
      - uv run --package ecoindex_api alembic revision --autogenerate -m "{{.CLI_ARGS}}"
    dir: ../..
    silent: true

  migration-upgrade:
    desc: Upgrade the database to the last migration
    cmds:
      - uv run --package ecoindex_api alembic upgrade head
    dir: ../..
    silent: true

  start-redis:
    internal: true
    cmds:
      - |
        if ! uv run python scripts/wait_redis.py > /dev/null 2>&1; then
          docker rm -f ecoindex-dev-redis 2>/dev/null || true
          docker run -p 6379:6379 -d --name ecoindex-dev-redis redis:alpine 2>/dev/null || docker start ecoindex-dev-redis 2>/dev/null || true
        fi
      - uv run python scripts/wait_redis.py > /dev/null
    status:
      - uv run python scripts/wait_redis.py > /dev/null
    silent: true

  start-worker:
    deps: [start-redis]
    cmds:
      - |
        REDIS_DEV_HOST="$(uv run python projects/ecoindex_api/scripts/wait_redis.py)"
        export REDIS_CACHE_HOST="$REDIS_DEV_HOST"
        export PYTHONPATH="bases:components"
        export RQ_WORKERS="{{.RQ_WORKERS}}"
        export RQ_REDIS_URL="redis://$REDIS_DEV_HOST:6379/0"
        export USE_UV="1"
        uv run --package ecoindex_api --group dev --group worker watchmedo auto-restart --directory=bases --directory=components --pattern=*.py --recursive -- bash projects/ecoindex_api/scripts/start_rq_workers.sh
    dir: ../..
    silent: true

  start-backend:
    deps: [start-redis]
    cmds:
      - |
        export REDIS_CACHE_HOST="$(uv run python projects/ecoindex_api/scripts/wait_redis.py)"
        export PYTHONPATH="bases:components"
        uv run --package ecoindex_api --group backend uvicorn ecoindex.backend.main:app --host 0.0.0.0 --port 8000 --reload --reload-dir bases --reload-dir components
    dir: ../..
    silent: true

  start-rq-dashboard:
    desc: Start the RQ dashboard for monitoring queues
    deps: [start-redis]
    cmds:
      - |
        REDIS_DEV_HOST="$(uv run python projects/ecoindex_api/scripts/wait_redis.py)"
        uv run --package ecoindex_api --group dev rq-dashboard \
          --bind 0.0.0.0 \
          --port {{.RQ_DASHBOARD_PORT}} \
          --redis-url "redis://$REDIS_DEV_HOST:6379/0"
    dir: ../..
    silent: true

  start-dev:
    deps: [start-backend, start-worker, start-rq-dashboard]
    desc: Start the backend, the worker and the RQ dashboard
    cmds:
      - echo "Starting the backend, worker and RQ dashboard (http://localhost:{{.RQ_DASHBOARD_PORT}})"
    silent: true

  init-env:
    desc: Initialize the .env file
    preconditions:
      - test -f .env.template
    cmds:
      - echo "Initialize the .env file"
      - cp .env.template .env
    silent: true
    internal: true
    status:
      - test -f .env

  init-dev-project:
    desc: Initialize the project for development
    cmds:
      - echo "Initialize the project for development"
      - echo "Install uv dependencies"
      - task: uv:install
      - echo "Install playwright"
      - task: uv:install-playwright
      - echo "Create the environment file"
      - task: init-env
      - echo "Create the database"
      - task: migration-upgrade
      - echo "All done!"
    dir: ../..
    silent: true

  init-docker-compose:
    desc: Initialize the docker-compose API
    internal: true
    cmds:
      - echo "Initialize the docker-compose API"
      - cp docker-compose.yml.template docker-compose.yml
    silent: true
    status:
      - test -f docker-compose.yml
